name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unsigned-ipa:
    name: Build unsigned IPA artifact
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Show project
        run: xcodebuild -list -project LocalTTS.xcodeproj

      - name: Resolve and patch Package dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies -project LocalTTS.xcodeproj -derivedDataPath build
          python3 -c '
          import os
          p = "build/SourcePackages/checkouts/espeak-ng-spm/Package.swift"
          if os.path.exists(p):
              with open(p, "r") as f:
                  c = f.read()
              target = ".define(\"N_PATH_HOME\", to: \"1024\"),"
              replacement = target + "\n        .unsafeFlags([\"-Wno-error=implicit-function-declaration\", \"-Wno-error=implicit-int\", \"-Wno-error=incompatible-pointer-types\"]),"
              if target in c:
                  c = c.replace(target, replacement)
                  with open(p, "w") as f:
                      f.write(c)
                  print("Patched Package.swift successfully!")
              else:
                  print("Error: Target string not found in Package.swift!")
                  exit(1)
          else:
              print(f"Error: {p} not found!")
              exit(1)
          '

      - name: Build app for device
        run: |
          set -euo pipefail
          xcodebuild \
            -project LocalTTS.xcodeproj \
            -scheme LocalTTS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/LocalTTS.app"
          test -d "$APP_PATH"
          rm -rf Payload LocalTTS-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry LocalTTS-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocalTTS-unsigned-ipa
          path: LocalTTS-unsigned.ipa
          if-no-files-found: error

  signed-ipa:
    name: Build signed IPA artifact
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check signing secrets
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          set -euo pipefail
          if [[ -n "$BUILD_CERTIFICATE_BASE64" && -n "$P12_PASSWORD" && -n "$BUILD_PROVISION_PROFILE_BASE64" && -n "$KEYCHAIN_PASSWORD" && -n "$EXPORT_OPTIONS_PLIST" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are not configured; skipping signed IPA export."
          fi

      - name: Select Xcode
        if: steps.signing.outputs.available == 'true'
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install signing assets
        if: steps.signing.outputs.available == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          EXPORT_OPTIONS_PATH="$RUNNER_TEMP/ExportOptions.plist"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PP_PATH"
          echo -n "$EXPORT_OPTIONS_PLIST" | base64 -D > "$EXPORT_OPTIONS_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PP_PATH" > "$PROFILE_PLIST"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          cp "$EXPORT_OPTIONS_PATH" "$RUNNER_TEMP/ExportOptions.plist"

      - name: Resolve and patch Package dependencies for Archive
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies -project LocalTTS.xcodeproj -derivedDataPath build
          python3 -c '
          import os
          p = "build/SourcePackages/checkouts/espeak-ng-spm/Package.swift"
          if os.path.exists(p):
              with open(p, "r") as f:
                  c = f.read()
              target = ".define(\"N_PATH_HOME\", to: \"1024\"),"
              replacement = target + "\n        .unsafeFlags([\"-Wno-error=implicit-function-declaration\", \"-Wno-error=implicit-int\", \"-Wno-error=incompatible-pointer-types\"]),"
              if target in c:
                  c = c.replace(target, replacement)
                  with open(p, "w") as f:
                      f.write(c)
                  print("Patched Package.swift successfully!")
              else:
                  print("Error: Target string not found in Package.swift!")
                  exit(1)
          else:
              print(f"Error: {p} not found!")
              exit(1)
          '

      - name: Archive
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          xcodebuild \
            -project LocalTTS.xcodeproj \
            -scheme LocalTTS \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            -archivePath "$RUNNER_TEMP/LocalTTS.xcarchive" \
            archive

      - name: Export signed IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/LocalTTS.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload signed IPA
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LocalTTS-signed-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
