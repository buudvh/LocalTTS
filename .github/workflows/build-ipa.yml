name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unsigned-ipa:
    name: Build unsigned IPA artifact
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Show project
        run: xcodebuild -list -project LocalTTS.xcodeproj

      - name: Resolve and patch Package dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies -project LocalTTS.xcodeproj -scheme LocalTTS -derivedDataPath build
          python3 -c '
          import os
          p = "build/SourcePackages/checkouts/espeak-ng-spm/Package.swift"
          if os.path.exists(p):
              os.chmod(p, 0o644)
              with open(p, "r") as f:
                  c = f.read()
              target = ".define(\"N_PATH_HOME\", to: \"1024\"),"
              replacement = target + "\n        .unsafeFlags([\"-Wno-error=implicit-function-declaration\", \"-Wno-error=implicit-int\", \"-Wno-error=incompatible-pointer-types\"]),"
              if target in c:
                  c = c.replace(target, replacement)
                  with open(p, "w") as f:
                      f.write(c)
                  print("Patched Package.swift successfully!")
              else:
                  print("Error: Target string not found in Package.swift!")
                  exit(1)
          else:
              print(f"Error: {p} not found!")
              exit(1)
          '

      - name: Build app for device
        run: |
          set -euo pipefail
          xcodebuild \
            -project LocalTTS.xcodeproj \
            -scheme LocalTTS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/LocalTTS.app"
          test -d "$APP_PATH"
          rm -rf Payload LocalTTS-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          
          # Install espeak-ng to get compiled data files
          HOMEBREW_NO_AUTO_UPDATE=1 brew install espeak-ng
          BREW_DATA_PATH="$(brew --prefix espeak-ng)/share/espeak-ng-data"
          DEST_DATA_PATH="Payload/LocalTTS.app/espeak-ng_data.bundle/espeak-ng-data"
          
          if [ -d "$DEST_DATA_PATH" ]; then
            echo "Copying compiled espeak-ng database files recursively to $DEST_DATA_PATH"
            cp -R "$BREW_DATA_PATH"/* "$DEST_DATA_PATH"/
            
            # Clean up unnecessary language dictionaries to reduce IPA size
            echo "Cleaning up unnecessary dictionaries..."
            for f in "$DEST_DATA_PATH"/*_dict; do
              [ -e "$f" ] || continue
              filename=$(basename "$f")
              if [ "$filename" != "vi_dict" ] && [ "$filename" != "en_dict" ]; then
                rm -f "$f"
              fi
            done
            
            # Clean up unnecessary voice configurations
            VOICES_DIR="$DEST_DATA_PATH/voices"
            if [ -d "$VOICES_DIR" ]; then
              echo "Cleaning up unnecessary voices..."
              for d in "$VOICES_DIR"/*; do
                [ -e "$d" ] || continue
                name=$(basename "$d")
                if [ -d "$d" ]; then
                  if [ "$name" != "!v" ] && [ "$name" != "en" ] && [ "$name" != "asia" ]; then
                    rm -rf "$d"
                  fi
                else
                  case "$name" in
                    active|default|en*|vi*) ;;
                    *) rm -f "$d" ;;
                  esac
                fi
              done
              
              # Keep only Vietnamese voices inside voices/asia
              if [ -d "$VOICES_DIR/asia" ]; then
                for f in "$VOICES_DIR/asia"/*; do
                  [ -e "$f" ] || continue
                  name=$(basename "$f")
                  case "$name" in
                    vi*) ;;
                    *) rm -rf "$f" ;;
                  esac
                done
              fi
            fi
            
            # Verify core espeak database files
            echo "Verifying core espeak-ng database files..."
            test -f "$DEST_DATA_PATH/phondata"
            test -f "$DEST_DATA_PATH/phontab"
            test -f "$DEST_DATA_PATH/phonindex"
            test -f "$DEST_DATA_PATH/intonations"
            echo "Core verification successful!"
            
            # Run CLI sanity check on runner
            echo "Running CLI sanity check on runner..."
            "$(brew --prefix espeak-ng)/bin/espeak-ng" -x "hello world"
            
            # Print diagnosis information in logs
            echo "Diagnostic: Available voice files in bundle:"
            ls -la "$DEST_DATA_PATH/voices" | head -n 30
          else
            echo "Error: $DEST_DATA_PATH does not exist!"
            exit 1
          fi
          
          /usr/bin/zip -qry LocalTTS-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocalTTS-unsigned-ipa
          path: LocalTTS-unsigned.ipa
          if-no-files-found: error

  signed-ipa:
    name: Build signed IPA artifact
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check signing secrets
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          set -euo pipefail
          if [[ -n "$BUILD_CERTIFICATE_BASE64" && -n "$P12_PASSWORD" && -n "$BUILD_PROVISION_PROFILE_BASE64" && -n "$KEYCHAIN_PASSWORD" && -n "$EXPORT_OPTIONS_PLIST" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are not configured; skipping signed IPA export."
          fi

      - name: Select Xcode
        if: steps.signing.outputs.available == 'true'
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install signing assets
        if: steps.signing.outputs.available == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          EXPORT_OPTIONS_PATH="$RUNNER_TEMP/ExportOptions.plist"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PP_PATH"
          echo -n "$EXPORT_OPTIONS_PLIST" | base64 -D > "$EXPORT_OPTIONS_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PP_PATH" > "$PROFILE_PLIST"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          cp "$EXPORT_OPTIONS_PATH" "$RUNNER_TEMP/ExportOptions.plist"

      - name: Resolve and patch Package dependencies for Archive
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies -project LocalTTS.xcodeproj -scheme LocalTTS -derivedDataPath build
          python3 -c '
          import os
          p = "build/SourcePackages/checkouts/espeak-ng-spm/Package.swift"
          if os.path.exists(p):
              os.chmod(p, 0o644)
              with open(p, "r") as f:
                  c = f.read()
              target = ".define(\"N_PATH_HOME\", to: \"1024\"),"
              replacement = target + "\n        .unsafeFlags([\"-Wno-error=implicit-function-declaration\", \"-Wno-error=implicit-int\", \"-Wno-error=incompatible-pointer-types\"]),"
              if target in c:
                  c = c.replace(target, replacement)
                  with open(p, "w") as f:
                      f.write(c)
                  print("Patched Package.swift successfully!")
              else:
                  print("Error: Target string not found in Package.swift!")
                  exit(1)
          else:
              print(f"Error: {p} not found!")
              exit(1)
          '

      - name: Archive
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          xcodebuild \
            -project LocalTTS.xcodeproj \
            -scheme LocalTTS \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            -archivePath "$RUNNER_TEMP/LocalTTS.xcarchive" \
            archive

      - name: Add compiled espeak-ng data to Archive
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/LocalTTS.xcarchive/Products/Applications/LocalTTS.app"
          test -d "$APP_PATH"
          
          HOMEBREW_NO_AUTO_UPDATE=1 brew install espeak-ng
          BREW_DATA_PATH="$(brew --prefix espeak-ng)/share/espeak-ng-data"
          DEST_DATA_PATH="$APP_PATH/espeak-ng_data.bundle/espeak-ng-data"
          
          if [ -d "$DEST_DATA_PATH" ]; then
            echo "Copying compiled espeak-ng database files recursively to Archive: $DEST_DATA_PATH"
            cp -R "$BREW_DATA_PATH"/* "$DEST_DATA_PATH"/
            
            # Clean up unnecessary language dictionaries to reduce Archive size
            echo "Cleaning up unnecessary dictionaries in Archive..."
            for f in "$DEST_DATA_PATH"/*_dict; do
              [ -e "$f" ] || continue
              filename=$(basename "$f")
              if [ "$filename" != "vi_dict" ] && [ "$filename" != "en_dict" ]; then
                rm -f "$f"
              fi
            done
            
            # Clean up unnecessary voice configurations
            VOICES_DIR="$DEST_DATA_PATH/voices"
            if [ -d "$VOICES_DIR" ]; then
              echo "Cleaning up unnecessary voices in Archive..."
              for d in "$VOICES_DIR"/*; do
                [ -e "$d" ] || continue
                name=$(basename "$d")
                if [ -d "$d" ]; then
                  if [ "$name" != "!v" ] && [ "$name" != "en" ] && [ "$name" != "asia" ]; then
                    rm -rf "$d"
                  fi
                else
                  case "$name" in
                    active|default|en*|vi*) ;;
                    *) rm -f "$d" ;;
                  esac
                fi
              done
              
              # Keep only Vietnamese voices inside voices/asia
              if [ -d "$VOICES_DIR/asia" ]; then
                for f in "$VOICES_DIR/asia"/*; do
                  [ -e "$f" ] || continue
                  name=$(basename "$f")
                  case "$name" in
                    vi*) ;;
                    *) rm -rf "$f" ;;
                  esac
                done
              fi
            fi
            
            # Verify core espeak database files in Archive
            echo "Verifying core espeak-ng database files in Archive..."
            test -f "$DEST_DATA_PATH/phondata"
            test -f "$DEST_DATA_PATH/phontab"
            test -f "$DEST_DATA_PATH/phonindex"
            test -f "$DEST_DATA_PATH/intonations"
            echo "Archive core verification successful!"
            
            # Run CLI sanity check on runner
            echo "Running CLI sanity check on runner..."
            "$(brew --prefix espeak-ng)/bin/espeak-ng" -x "hello world"
            
            # Print diagnosis information in Archive logs
            echo "Diagnostic Archive: Available voice files in bundle:"
            ls -la "$DEST_DATA_PATH/voices" | head -n 30
          else
            echo "Error: $DEST_DATA_PATH not found in Archive!"
            exit 1
          fi

      - name: Export signed IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/LocalTTS.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload signed IPA
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LocalTTS-signed-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
